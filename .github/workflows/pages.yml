name: Deploy GitHub Pages

# Builds the React search frontend and deploys docs/ to GitHub Pages.
# The deployed site combines:
#   - docs/               ← built from frontend/ in this workflow
#   - docs/indexes/       ← copied from data/indexes/ in this workflow
#
# Pages source must be configured to "GitHub Actions" in
# Settings → Pages → Source. (One-time manual step.)
#
# Triggers:
#   1. push to main when frontend source OR the search index changes
#   2. workflow_run after embeddings.yml completes (covers the case where
#      the index was just updated but no frontend code changed)
#   3. workflow_dispatch for manual rebuilds

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/indexes/**'
      - 'docs/README.md'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Build Search Embeddings"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Single in-flight deploy at a time; cancel queued runs when superseded.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        # PAGES_BASE='/' for custom domain deployment at https://osint.builders/
        # Vite emits asset URLs relative to the domain root.
        run: PAGES_BASE="/" npm run build
        working-directory: frontend

      - name: Generate event detail files for frontend (from JSONL)
        run: python3 builder/embeddings/backfill_event_details.py

      - name: Copy indexes into docs for Pages upload
        run: |
          if [ -d data/indexes ]; then
            cp -r data/indexes docs/indexes
          else
            echo "::warning::data/indexes/ not found. Searches will fail until embeddings.yml runs."
          fi

      - name: Verify build output
        run: |
          test -f docs/index.html || { echo "::error::docs/index.html missing after build"; exit 1; }
          if [ ! -d docs/indexes ] || [ -z "$(ls -A docs/indexes 2>/dev/null)" ]; then
            echo "::warning::docs/indexes/ is empty. The site will deploy but searches will fail until embeddings.yml runs at least once."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
