name: Hourly OSINT Collection

on:
  schedule:
    # Runs every hour at :00 UTC
    # Examples (converting to EST):
    #   UTC 14:00 = EST 10:00 (EDT) / 09:00 (standard time)
    #   UTC 18:00 = EST 14:00 (EDT) / 13:00 (standard time)
    # Data extraction targets 1 hour before execution (handled in builder/index.ts)
    - cron: '0 * * * *'
  workflow_dispatch:      # Manual trigger for testing
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'         # Don't trigger on data changes
      - 'memory.md'       # Don't trigger on memory updates
      - '**/*.md'         # Don't trigger on documentation changes

permissions:
  contents: read
  actions: read

env:
  WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
  WARP_ENVIRONMENT_ID: ${{ secrets.WARP_ENVIRONMENT_ID }}
  PARALLEL_AGENT_COUNT: ${{ vars.PARALLEL_AGENT_COUNT || '5' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    # Increased timeout to accommodate 5 parallel agents processing 142 sources
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install builder dependencies
        run: npm ci
        working-directory: builder

      - name: Debug environment
        run: |
          echo "PARALLEL_AGENT_COUNT from vars: ${{ vars.PARALLEL_AGENT_COUNT }}"
          echo "PARALLEL_AGENT_COUNT env var: ${PARALLEL_AGENT_COUNT}"
        working-directory: builder

      - name: Run OSINT collection
        run: npm run collect
        working-directory: builder
        env:
          REPO_ROOT: ${{ github.workspace }}
