name: Daily OSINT Collection

on:
  schedule:
    # 4 runs per day during EST business hours (UTC-4 in EDT):
    # 13:00 UTC = 9am EDT   16:00 UTC = noon EDT
    # 19:00 UTC = 3pm EDT   22:00 UTC = 6pm EDT
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:      # Manual trigger for testing
  push:
    branches:
      - main
    paths-ignore:
      # The cloud agent's own commits shouldn't re-trigger the workflow.
      - 'data/**'
      - 'docs/**'
      - 'data/indexes/**'
      - 'LEARNINGS.md'
      # Documentation changes don't affect runtime behavior.
      - '**/*.md'
      # Infrastructure-only changes that don't alter collection behavior.
      - 'builder/**/*.py'
      - 'builder/**/*.js'
      - 'builder/**/*.ts'
      - 'frontend/**'

permissions:
  contents: read
  actions: read

env:
  WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
  WARP_ENVIRONMENT_ID: ${{ secrets.WARP_ENVIRONMENT_ID }}
  PARALLEL_AGENT_COUNT: ${{ vars.PARALLEL_AGENT_COUNT || '10' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install builder dependencies
        run: npm ci
        working-directory: builder

      - name: Run OSINT collection
        run: npm run collect
        working-directory: builder
        env:
          REPO_ROOT: ${{ github.workspace }}

