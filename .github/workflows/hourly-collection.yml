name: Daily OSINT Collection

on:
  schedule:
    # 06:00 UTC every day.
    - cron: '0 6 * * *'
  workflow_dispatch:      # Manual trigger for testing
  push:
    branches:
      - main
    paths-ignore:
      # The cloud agent's own commits shouldn't re-trigger the workflow.
      - 'data/**'
      - 'docs/search-index/**'
      - 'LEARNINGS.md'
      # Documentation changes don't affect runtime behavior.
      - '**/*.md'

permissions:
  contents: read
  actions: read

env:
  WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
  WARP_ENVIRONMENT_ID: ${{ secrets.WARP_ENVIRONMENT_ID }}
  PARALLEL_AGENT_COUNT: ${{ vars.PARALLEL_AGENT_COUNT || '5' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install builder dependencies
        run: npm ci
        working-directory: builder

      - name: Run OSINT collection
        run: npm run collect
        working-directory: builder
        env:
          REPO_ROOT: ${{ github.workspace }}

