name: Daily OSINT Collection

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:      # Manual trigger for testing
  push:
    branches:
      - main
    paths-ignore:
      # The cloud agent's own commits shouldn't re-trigger the workflow.
      - 'data/**'
      - 'docs/**'
      - 'data/indexes/**'
      - 'LEARNINGS.md'
      # Documentation changes don't affect runtime behavior.
      - '**/*.md'
      # Infrastructure-only changes that don't alter collection behavior.
      - 'builder/**/*.py'
      - 'builder/**/*.js'
      - 'builder/**/*.ts'
      - 'frontend/**'
      # CI/infra changes don't affect what the agents collect.
      - '.github/**'
      - 'skills/**'

# Prevent overlapping collection runs. If a new run is triggered while one is
# already in progress, queue it rather than running concurrently — the SIGTERM
# handler in builder/index.ts cancels outstanding agents before exit.
concurrency:
  group: osint-collection
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
  WARP_ENVIRONMENT_ID: ${{ secrets.WARP_ENVIRONMENT_ID }}
  PARALLEL_AGENT_COUNT: ${{ vars.PARALLEL_AGENT_COUNT || '10' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install builder dependencies
        run: npm ci
        working-directory: builder

      - name: Run OSINT collection
        run: npm run collect
        working-directory: builder
        env:
          REPO_ROOT: ${{ github.workspace }}

