name: Hourly OSINT Collection

on:
  schedule:
    - cron: '0 * * * *'  # Every hour at :00
  workflow_dispatch:      # Manual trigger for testing
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'         # Don't trigger on data changes
      - 'memory.md'       # Don't trigger on memory updates
      - '**/*.md'         # Don't trigger on documentation changes

permissions:
  contents: write         # Push commits
  actions: read          # Read workflow status

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            bin/sandcastle/package-lock.json
            bin/agent-browser/package-lock.json
            bin/perplexity/package-lock.json
            bin/data-to-markdown/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Git
        run: |
          git config user.name "OSINT Collector Bot"
          git config user.email "osint-bot@github-actions"

      - name: Install jq (JSON processor)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Node dependencies
        run: |
          echo "Installing bin/sandcastle dependencies..."
          cd bin/sandcastle && npm ci && cd ../..

          echo "Installing bin/agent-browser dependencies..."
          cd bin/agent-browser && npm ci && cd ../..

          echo "Installing bin/perplexity dependencies..."
          cd bin/perplexity && npm ci && cd ../..

          echo "Installing bin/data-to-markdown dependencies..."
          cd bin/data-to-markdown && npm ci && cd ../..

          echo "✓ All Node dependencies installed"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          echo "✓ Python dependencies installed"

      - name: Run OSINT collection
        run: python -m orchestrator.main
        env:
          REPO_ROOT: ${{ github.workspace }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload artifacts (data folder)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osint-data-run-${{ github.run_number }}
          path: |
            data/events/**/*.jsonl
            data/media/**/*
            data/indexes/*.json
            memory.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Push results to repository
        if: success()
        run: |
          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Push with retry
          echo "Pushing changes to repository..."
          git push origin main || {
            echo "Push failed, attempting pull and retry..."
            git pull --rebase origin main
            git push origin main
          }

          echo "✓ Successfully pushed changes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
