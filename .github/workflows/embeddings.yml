name: Build Search Embeddings

# Rebuilds the semantic search index after every successful hourly
# collection. Decoupled from hourly-collection.yml (PR-H) so the two
# cadences can evolve independently — collection is the OSINT product;
# embeddings power a downstream search UI.

on:
  workflow_run:
    workflows: ["Daily OSINT Collection"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write     # commits data/indexes/ artifacts + data/stats.json

jobs:
  build-embeddings:
    # Only run if the upstream collection succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: builder/embeddings/requirements.txt

      - name: Install embedding dependencies
        run: pip install -r builder/embeddings/requirements.txt

      - name: Install Node.js (for rebuild-indexes)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build search index
        run: python builder/embeddings/build_index.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}

      - name: Rebuild indexes and commit
        run: |
          # Rebuild data indexes + unified stats before committing
          node data/scripts/rebuild-indexes.js

          git config user.name "OSINT Embeddings Bot"
          git config user.email "embeddings-bot@github-actions"
          # Add indexes but exclude generated events/ (regenerated at Pages deploy time)
          git add data/indexes/fingerprints.json data/indexes/metadata.json data/indexes/pca_transform.json data/indexes/schema.json data/indexes/by-source.json data/indexes/by-topic.json data/indexes/by-location.json data/stats.json
          # [skip ci] prevents this push from re-triggering anything.
          git diff-index --quiet HEAD || git commit -m "Update search index, indexes, and stats

          Generated embeddings for events collected at $(date -u +%Y-%m-%dT%H:%M:%SZ)

          [skip ci]"
          git pull --rebase origin main
          git push
